name: Deploy Meal Planner

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: europe-west1

jobs:
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
      - name: Install and check
        run: |
          cd backend
          uv sync
          uv run python -c "from app.main import app; print('Import OK')"

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npx tsc --noEmit
        working-directory: frontend

  deploy:
    name: Deploy to GCP
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v5
      - uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
      - name: Submit to Cloud Build
        run: |
          gcloud builds submit \
            --suppress-logs \
            --config=cloudbuild.yaml \
            --substitutions=_REGION=${{ env.GCP_REGION }},SHORT_SHA=${{ github.sha }},_FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY }},_FIREBASE_AUTH_DOMAIN=npzr-2010.firebaseapp.com,_API_KEY=${{ secrets.API_KEY }} \
            .
